<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柴犬の物語</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #f5f5f5;
    font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
    color: #222;
}

/* pantalla completa */
.novel {
    height: 90vh;
    width: 100vw;

    background: #fff;
    padding: 24px;

    box-sizing: border-box;

    writing-mode: vertical-rl;
    text-orientation: mixed;

    overflow-x: auto;
    overflow-y: hidden;

    line-height: 2.0;
    letter-spacing: 0.06em;
}

/* título más grande */
.title {
    font-size: 28px;
    font-weight: bold;
    margin-left: 30px;
}

/* texto principal MÁS GRANDE */
.p {
    font-size: 2rem;
    margin-left: 24px;
}

/* diálogo */
.dialog {
    font-size: 20px;
    color: #1f6feb;
}

/* separación narrativa */
.sep {
    margin-left: 35px;
    color: #aaa;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="novel">

    <div class="title">柴犬と雨の帰り道</div>

    <div class="p">
        その柴犬は、駅前の屋根の下から動かなかった。<br>
        雨の日も、風の日も、ずっとそこにいた。
    </div>

    <div class="p">
        誰かを待っているのか、それともただ居場所を失ったのかは分からない。
    </div>

    <div class="p dialog">
        「今日もいるな」
    </div>

    <div class="p">
        少年は立ち止まり、小さく息を吐いた。
    </div>

    <div class="sep">――</div>

    <div class="p">
        その犬の目は、ただ一点を見ていた。<br>
        過去でも未来でもなく、“今”だけを見ている目だった。
    </div>

</div>

</body>
</html>
