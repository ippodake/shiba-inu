<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>異世界の記録</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #0f0f1a;
    color: #eaeaea;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    line-height: 1.9;
}

.container {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px;
}

.title {
    text-align: center;
    font-size: 28px;
    margin-bottom: 40px;
    color: #ffd36e;
    letter-spacing: 2px;
}

.chapter {
    font-size: 16px;
    margin-bottom: 20px;
}

.dialog {
    color: #9ad1ff;
}

.thought {
    color: #c8c8c8;
    font-style: italic;
}

.box {
    border-left: 3px solid #ffd36e;
    padding-left: 12px;
    margin: 20px 0;
    color: #ffffff;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">異世界転生したけど、何も始まらない</div>

    <div class="chapter">
        気がついたとき、俺は見知らぬ森の中に立っていた。<br>
        空は不自然なほど青く、風は妙に静かだった。
    </div>

    <div class="chapter dialog">
        「……ここはどこだ？」  
    </div>

    <div class="chapter thought">
        （夢、なのか？それとも……いや、現実だ）
    </div>

    <div class="box">
        足元には古びた剣が落ちていた。錆びているが、なぜか妙な存在感がある。
    </div>

    <div class="chapter">
        選択肢はない。進むしかない。<br>
        それが、この世界の“始まり”だった。
    </div>

</div>

</body>
</html>
